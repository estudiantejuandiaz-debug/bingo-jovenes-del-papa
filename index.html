<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bingo Benéfico · Fundación Jóvenes del Papa</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;background:#040410;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Inter',sans-serif}
.frame{width:600px;height:640px;position:relative;overflow:hidden;background:#08060E;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
canvas{position:absolute;inset:0;pointer-events:none}
.c{position:absolute;width:24px;height:24px}
.tl{top:18px;left:18px;border-top:1px solid rgba(192,35,28,.65);border-left:1px solid rgba(192,35,28,.65)}
.tr{top:18px;right:18px;border-top:1px solid rgba(192,35,28,.65);border-right:1px solid rgba(192,35,28,.65)}
.bl{bottom:18px;left:18px;border-bottom:1px solid rgba(192,35,28,.65);border-left:1px solid rgba(192,35,28,.65)}
.br{bottom:18px;right:18px;border-bottom:1px solid rgba(192,35,28,.65);border-right:1px solid rgba(192,35,28,.65)}
.inner{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;width:100%;padding:0 44px}
.logo-img{width:72px;height:72px;border-radius:16px;object-fit:cover;margin-bottom:14px}
.fundacion{font-size:8.5px;font-weight:600;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:5px;text-align:center}
.titulo{font-size:24px;font-weight:700;color:#C0231C;letter-spacing:5px;text-transform:uppercase;margin-bottom:20px;text-align:center}
.hr{width:100%;height:1px;background:rgba(192,35,28,.65);margin-bottom:26px}
.hr2{width:100%;height:1px;background:rgba(192,35,28,.4);margin-top:26px;margin-bottom:16px}
.row{display:flex;align-items:flex-start;justify-content:center;gap:3px;width:100%}
.unit{flex:1;display:flex;flex-direction:column;align-items:center}
.num{font-family:'Orbitron',monospace;font-size:44px;font-weight:900;color:#fff;line-height:1;text-align:center;width:100%;letter-spacing:-1px;transition:color .18s}
.num-d{font-size:38px}
.lbl{font-size:8px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#C0231C;margin-top:10px}
.colon{font-family:'Orbitron',monospace;font-size:30px;font-weight:700;color:rgba(192,35,28,.4);line-height:1;flex-shrink:0;padding-top:5px}
.fecha{font-size:10px;font-weight:300;letter-spacing:5.5px;text-transform:uppercase;color:rgba(255,255,255,.28)}
@media(max-width:640px){.frame{width:100vw;height:100vw;border-radius:0}.num{font-size:10vw}.num-d{font-size:9vw}.colon{font-size:7vw}}
</style>
</head>
